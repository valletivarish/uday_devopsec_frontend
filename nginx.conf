# ============================================================================
# Nginx Configuration - Order Processing & Management Frontend
#
# Serves the React SPA and proxies API requests to the backend service.
# Includes security headers, gzip compression, and SPA routing support.
#
# Author: Uday Kiran Reddy Dodda (x25166484)
# ============================================================================

server {
    listen 80;
    server_name localhost;

    # Serve the React SPA from the build output directory
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── API Proxy ────────────────────────────────────────────────────
    # Forward all /api requests to the backend container
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA Routing ──────────────────────────────────────────────────
    # For any route that does not match a static file, serve index.html
    # so that React Router can handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────────
    # Cache JS, CSS, and image assets for 1 year (Vite uses content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
